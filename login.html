<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - NK Digital Hub</title>
</head>

<body style="font-family:Arial;text-align:center;background:#f4f6f9">

<h2>NK Digital Hub Login</h2>

<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p>Only authorized users can access dashboard</p>

<script>
function login(){

let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

// SIMPLE DEMO LOGIN (you can change later)
if(u==="nk" && p==="1234"){
localStorage.setItem("nk_login","true");
window.location.href="dashboard.html";
}
else{
alert("Invalid Login");
}

}
</script>

</body>
</html>
